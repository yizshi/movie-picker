<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Results - Distributed Denial of Screentime</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .podium-container {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .podium-item {
      text-align: center;
      border-radius: 8px;
      padding: 15px;
      color: white;
      min-width: 120px;
      position: relative;
      animation: slideUp 0.6s ease-out;
    }
    .podium-item.first {
      background: linear-gradient(135deg, #ffd700, #ffed4a);
      color: #8b5a00;
      height: 140px;
      order: 2;
    }
    .podium-item.second {
      background: linear-gradient(135deg, #c0c0c0, #e2e8f0);
      color: #4a5568;
      height: 110px;
      order: 1;
    }
    .podium-item.third {
      background: linear-gradient(135deg, #cd7f32, #d69e2e);
      color: #744210;
      height: 80px;
      order: 3;
    }
    .podium-position {
      font-size: 2em;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .podium-movie-title {
      font-weight: bold;
      font-size: 0.9em;
      margin-bottom: 5px;
      line-height: 1.2;
    }
    .podium-score {
      font-size: 1.2em;
      font-weight: bold;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .ranking-bar-container {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      transition: all 0.3s ease;
    }
    .ranking-bar-container:hover {
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      border-color: #cbd5e0;
    }
    .ranking-bar {
      height: 30px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      padding: 0 15px;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .ranking-bar.rank-1 { background: linear-gradient(90deg, #ffd700, #ffed4a); color: #8b5a00; }
    .ranking-bar.rank-2 { background: linear-gradient(90deg, #c0c0c0, #e2e8f0); color: #4a5568; }
    .ranking-bar.rank-3 { background: linear-gradient(90deg, #cd7f32, #d69e2e); color: #744210; }
    .ranking-bar.rank-other { background: linear-gradient(90deg, #667eea, #764ba2); color: white; }
  </style>
</head>
<body>
  <div class="container py-4">
    <a href="/" class="btn btn-link">← Back</a>
    <h1 class="mb-3">Results</h1>

    <div class="row">
      <div class="col-md-6">
        <h2 id="results-meeting-name" class="mb-1 text-muted">(showing current open meeting or last finished meeting)</h2>
     <div id="results-meeting-date" class="mb-1 text-muted"></div>
     <div class="mb-3">
       <div id="results-meeting-date-counts" class="text-muted mb-2"></div>
       <div id="date-voting-results" class="date-results-container"></div>
     </div>
        <div class="mb-4">
          <h5>🏆 Top Movies</h5>
          <div id="podium-display">
            <!-- Podium style top 3 will be here -->
          </div>
        </div>
        
        <div class="mb-4">
          <h5>📊 Current standings</h5>
          <div id="ranking-bars">
            <!-- Progress bars for all movies will be here -->
          </div>
        </div>
        
        <div id="results-list"></div>
        <hr />
        <div class="mt-3">
          <a id="goto-watched-page" class="btn btn-outline-primary btn-sm" href="/watched-list.html">Open watched meetings</a>
        </div>
      </div>
      <div class="col-md-6">
        <h3 class="mt-4">Winning suggestion</h3>
        <div id="movies-list" class="row gy-3"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
