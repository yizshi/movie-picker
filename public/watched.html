<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Watched - Distruibued Denail of Screentime</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container py-4">
    <a href="/results.html" class="btn btn-link">← Back to results</a>
    <h1 class="mb-3">Watched movie</h1>

    <div id="watched-area">
      <div id="movie-card" class="mb-4"></div>

      <h4>Community score</h4>
      <div id="average-score" class="mb-3 text-muted">Loading average...</div>

      <h5>Leave a score & comment</h5>
      <form id="review-form" class="mb-4">
        <div class="mb-2">
          <label class="form-label">Your name</label>
          <input type="text" id="review-name" class="form-control" placeholder="Name (optional)">
        </div>
        <div class="mb-2">
          <label class="form-label">Score (0-10)</label>
          <input type="number" id="review-score" class="form-control" min="0" max="10" required>
        </div>
        <div class="mb-2">
          <label class="form-label">Comment</label>
          <textarea id="review-comment" class="form-control" rows="3" placeholder="Share your thoughts (optional)"></textarea>
        </div>
        <button class="btn btn-primary" type="submit">Submit review</button>
        <div id="review-msg" class="mt-2"></div>
      </form>

      <h5>Comments</h5>
      <div id="reviews-list"></div>
    </div>
  </div>

  <script>
    // Read meetingId from query param, or fallback to none
    function qs(name) { const u = new URL(window.location.href); return u.searchParams.get(name); }
    const meetingId = qs('meetingId');

    // Helper function to render genres as tags
    function renderGenres(genres) {
      if (!genres) return '';
      
      let genreArray;
      try {
        genreArray = typeof genres === 'string' ? JSON.parse(genres) : genres;
      } catch (e) {
        return '';
      }
      
      if (!Array.isArray(genreArray) || genreArray.length === 0) return '';
      
      const tags = genreArray.map(genre => `<span class="genre-tag">${genre}</span>`).join('');
      return `<div class="genre-tags">${tags}</div>`;
    }

    // Helper function to render suggester information
    function renderSuggester(movie) {
      // Handle both old and new data formats
      if (movie.suggestions && Array.isArray(movie.suggestions)) {
        if (movie.suggestions.length === 1) {
          return `Suggested by: ${movie.suggestions[0].suggester || 'Anonymous'}`;
        } else if (movie.suggestions.length > 1) {
          const names = movie.suggestions.map(s => s.suggester || 'Anonymous').join(', ');
          return `Suggested by: ${names}`;
        }
      }
      // Fallback to old format
      return `Suggested by: ${movie.suggester || 'Anonymous'}`;
    }

    // Helper function to format Firestore timestamps
    function formatTimestamp(timestamp) {
      if (!timestamp) return 'Unknown date';
      
      // Handle Firestore Timestamp object
      if (timestamp._seconds) {
        return new Date(timestamp._seconds * 1000).toLocaleString();
      }
      
      // Handle regular Date objects or ISO strings
      try {
        return new Date(timestamp).toLocaleString();
      } catch (e) {
        return 'Invalid date';
      }
    }

    async function fetchMeeting(id) {
      const res = await fetch(`/api/meetings/${id}`); return await res.json();
    }
    async function fetchReviews(movieId) {
      const res = await fetch(`/api/movies/${movieId}/reviews`); return await res.json();
    }
    async function postReview(movieId, body) {
      const res = await fetch(`/api/movies/${movieId}/reviews`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }); return await res.json();
    }
    async function deleteReview(reviewId) {
      const token = localStorage.getItem('adminToken');
      const res = await fetch(`/api/reviews/${reviewId}`, { 
        method: 'DELETE', 
        headers: {
          'Content-Type': 'application/json',
          'X-Admin-Token': token
        }
      }); 
      return await res.json();
    }
    async function checkAdminStatus() {
      const token = localStorage.getItem('adminToken');
      if (!token) return false;
      try {
        const res = await fetch(`/api/admin/me`, {
          headers: { 'X-Admin-Token': token }
        });
        const data = await res.json();
        return data.admin === true;
      } catch (error) {
        return false;
      }
    }

    async function renderReviews(movieId, isAdmin) {
      const data = await fetchReviews(movieId);
      document.getElementById('average-score').textContent = data.average !== null ? `Average: ${data.average} (${data.count} votes)` : 'No scores yet';
      const list = document.getElementById('reviews-list'); 
      list.innerHTML = '';
      
      if (data.reviews && data.reviews.length) {
        for (const r of data.reviews) {
          const el = document.createElement('div'); 
          el.className = 'card mb-2';
          const deleteButton = isAdmin ? 
            `<button class="btn btn-sm btn-outline-danger ms-2" onclick="handleDeleteReview('${r.id}', '${movieId}')">Delete</button>` : '';
          el.innerHTML = `
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start">
                <div class="flex-grow-1">
                  <h6 class="card-subtitle mb-1 text-muted">${r.username || 'Anonymous'} — ${formatTimestamp(r.created_at)}</h6>
                  <div class="fw-bold">Score: ${r.score}</div>
                  <p class="card-text">${r.comment || ''}</p>
                </div>
                ${deleteButton}
              </div>
            </div>
          `;
          list.appendChild(el);
        }
      } else {
        list.innerHTML = '<div class="text-muted">No comments yet.</div>';
      }
    }

    async function render() {
      const area = document.getElementById('watched-area');
      if (!meetingId) { area.innerHTML = '<div class="text-muted">No meeting specified.</div>'; return; }
      try {
        // Check admin status
        const isAdmin = await checkAdminStatus();
        
        const meeting = await fetchMeeting(meetingId);
        if (!meeting) { area.innerHTML = '<div class="text-muted">Meeting not found.</div>'; return; }
        if (!meeting.watched_movie) { 
          const meetingName = meeting.name || meeting.date || `Meeting ${meetingId}`;
          area.innerHTML = `
            <div class="alert alert-info">
              <h5>No movie selected for ${meetingName}</h5>
              <p>This meeting finished voting but no movie was automatically selected. This happens when:</p>
              <ul class="mb-3">
                <li>No votes were cast during the voting period</li>
                <li>All movies received equal scores</li>
              </ul>
              <p class="mb-0">
                <a href="/results.html?meetingId=${meetingId}" class="btn btn-primary">View voting results</a>
                <a href="/admin-meetings.html" class="btn btn-outline-secondary ms-2">Manage meetings (Admin)</a>
              </p>
            </div>
          `; 
          return; 
        }
        const mv = meeting.watched_movie;
        const genresHtml = renderGenres(mv.genres);
        const card = `
          <div class="card flex-row">
            <div style="padding:0.5rem">
              <img src="${mv.poster || 'https://via.placeholder.com/240x360?text=No+Poster'}" alt="${mv.title}" width="160" height="240" style="object-fit:cover" />
            </div>
            <div class="card-body">
              <h3 class="card-title">${mv.title}</h3>
              ${genresHtml}
              <p class="card-text">${mv.notes || ''}</p>
              <div class="text-muted">${renderSuggester(mv)}</div>
            </div>
          </div>
        `;
        document.getElementById('movie-card').innerHTML = card;

        // wire the Open watched page link on results to this page if present
        const goto = document.getElementById('goto-watched-page');
        if (goto) goto.href = `/watched.html?meetingId=${meetingId}`;

        // load reviews
        await renderReviews(mv.id, isAdmin);

        // form submit
        const form = document.getElementById('review-form');
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const name = document.getElementById('review-name').value.trim();
          const score = Number(document.getElementById('review-score').value);
          const comment = document.getElementById('review-comment').value.trim();
          const msg = document.getElementById('review-msg'); msg.textContent = '';
          if (isNaN(score) || score < 0 || score > 10) { msg.textContent = 'Score must be 0-10'; return; }
          try {
            const res = await postReview(mv.id, { username: name || null, score, comment: comment || null });
            if (!res || res.error) throw new Error(res && res.error ? res.error : 'Failed');
            // refresh
            document.getElementById('review-name').value = '';
            document.getElementById('review-score').value = '';
            document.getElementById('review-comment').value = '';
            await renderReviews(mv.id, isAdmin);
            msg.textContent = 'Thanks for your review';
          } catch (err) {
            msg.textContent = err.message || 'Error submitting review';
          }
        });

      } catch (err) {
        area.innerHTML = '<div class="text-muted">Error loading watched movie.</div>';
      }
    }

    async function handleDeleteReview(reviewId, movieId) {
      if (!confirm('Are you sure you want to delete this review?')) {
        return;
      }
      
      try {
        const res = await deleteReview(reviewId);
        if (!res || res.error) {
          throw new Error(res?.error || 'Failed to delete review');
        }
        
        // Re-render reviews with updated data from the server
        const isAdmin = await checkAdminStatus();
        await renderReviews(movieId, isAdmin);
      } catch (error) {
        alert('Error deleting review: ' + error.message);
      }
    }

    render();
  </script>
</body>
</html>
