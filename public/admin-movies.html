<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Manager - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .movie-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }
        .movie-card {
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 1rem;
            position: relative;
        }
        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 4px;
        }
        .movie-card h3 {
            margin: 0.5rem 0;
        }
        .delete-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.5rem;
            cursor: pointer;
        }
        .delete-btn:hover {
            background: #cc0000;
        }
        .hide-btn {
            position: absolute;
            top: 0.5rem;
            right: 4rem;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .hide-btn:hover {
            background: #495057;
        }
        .hide-btn.hidden-active {
            background: #fd7e14;
        }
        .hide-btn.hidden-active:hover {
            background: #dc6502;
        }
        .movie-card.is-hidden {
            opacity: 0.45;
            border: 2px dashed #adb5bd;
        }
        .hidden-badge {
            display: inline-block;
            background: #fd7e14;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 0.25rem;
        }
        .auth-section {
            padding: 1rem;
            background: #f5f5f5;
            margin-bottom: 1rem;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Movie Manager</h1>
            <div>
                <a href="/" class="btn btn-outline-secondary me-2">Home</a>
                <button onclick="logout()" id="logoutBtn" class="btn btn-outline-danger d-none">Logout</button>
            </div>
        </div>
        <div class="auth-section" id="loginSection">
            <h2>Admin Login</h2>
            <div class="input-group mb-3">
                <input type="password" id="passwordInput" class="form-control" placeholder="Enter admin password">
                <button onclick="login()" class="btn btn-primary">Login</button>
            </div>
        </div>
        <div id="movieSection" class="hidden">
            <div class="d-flex justify-content-between align-items-center px-3 pb-2">
                <small class="text-muted" id="movieCountLabel"></small>
                <div class="d-flex align-items-center gap-3">
                    <button type="button" class="btn btn-warning btn-sm" id="hideAllBtn" onclick="hideAllMovies()">Hide all visible</button>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox" id="showHiddenToggle" onchange="loadMovies()">
                        <label class="form-check-label" for="showHiddenToggle">Show hidden movies</label>
                    </div>
                </div>
            </div>
            <div class="movie-list" id="movieList">
                <!-- Movies will be loaded here -->
            </div>
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <script>
        let adminToken = localStorage.getItem('adminToken');
        const loginSection = document.getElementById('loginSection');
        const movieSection = document.getElementById('movieSection');
        const movieList = document.getElementById('movieList');

        // Check if admin is logged in
        async function checkAdminStatus() {
            try {
                const response = await fetch('/api/admin/me', {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                const data = await response.json();
                if (data.admin) {
                    showAdminUI();
                    loadMovies();
                } else {
                    hideAdminUI();
                }
            } catch (err) {
                hideAdminUI();
            }
        }

        // Login function
        async function login() {
            const password = document.getElementById('passwordInput').value;
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (data.token) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    document.getElementById('passwordInput').value = '';
                    showAdminUI();
                    loadMovies();
                } else {
                    alert('Invalid password');
                }
            } catch (err) {
                alert('Login failed');
            }
        }

        // Logout function
        async function logout() {
            try {
                await fetch('/api/admin/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
            } catch (err) {
            }
            adminToken = null;
            localStorage.removeItem('adminToken');
            hideAdminUI();
        }

        // UI helper functions
        function showAdminUI() {
            loginSection.classList.add('hidden');
            movieSection.classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('d-none');
        }

        function hideAdminUI() {
            loginSection.classList.remove('hidden');
            movieSection.classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('d-none');
            adminToken = null;
            localStorage.removeItem('adminToken');
        }

        // Load all movies
        async function loadMovies() {
            try {
                const showHidden = document.getElementById('showHiddenToggle')?.checked;
                const response = await fetch('/api/movies?include_hidden=true', {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const movies = await response.json();
                const visible = movies.filter(m => !m.hidden);
                const hidden = movies.filter(m => m.hidden);
                const countLabel = document.getElementById('movieCountLabel');
                if (countLabel) {
                    countLabel.textContent = `${visible.length} visible, ${hidden.length} hidden`;
                }
                const toShow = showHidden ? movies : visible;
                movieList.innerHTML = toShow.map(movie => {
                    const isHidden = movie.hidden;
                    const suggesterText = movie.suggestions && movie.suggestions.length > 0
                        ? movie.suggestions.map(s => s.suggester || 'Anonymous').join(', ')
                        : (movie.suggester || 'Anonymous');
                    return `
                    <div class="movie-card${isHidden ? ' is-hidden' : ''}">
                        <img src="${movie.poster || 'placeholder.jpg'}" alt="${movie.title}">
                        ${isHidden ? '<span class="hidden-badge">Hidden</span>' : ''}
                        <h3>${movie.title}</h3>
                        <p>Suggested by: ${suggesterText}</p>
                        <button class="hide-btn${isHidden ? ' hidden-active' : ''}" onclick="toggleHideMovie('${movie.id}', ${isHidden})">${isHidden ? 'Unhide' : 'Hide'}</button>
                        <button class="delete-btn" onclick="deleteMovie('${movie.id}')">Delete</button>
                    </div>
                `}).join('');
            } catch (err) {
            }
        }

        // Bulk-hide every currently visible movie.
        async function hideAllMovies() {
            if (!adminToken) { alert('You must be logged in as admin'); return; }
            if (!confirm('Hide all currently visible movies? Existing suggestions are kept and can be unhidden individually.')) return;
            const btn = document.getElementById('hideAllBtn');
            if (btn) { btn.disabled = true; btn.textContent = 'Hiding…'; }
            try {
                const response = await fetch('/api/movies/hide-all', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    if (response.status === 401) { alert('Your admin session has expired. Please log in again.'); hideAdminUI(); return; }
                    alert(data?.error || 'Failed to hide all movies');
                    return;
                }
                try { sessionStorage.removeItem('moviesCache'); } catch (e) {}
                await loadMovies();
                alert(`Hid ${data.hidden ?? 0} movie(s).`);
            } catch (err) {
                alert('Error hiding all movies');
            } finally {
                if (btn) { btn.disabled = false; btn.textContent = 'Hide all visible'; }
            }
        }

        // Toggle movie visibility
        async function toggleHideMovie(id, currentlyHidden) {
            if (!adminToken) {
                alert('You must be logged in as admin');
                return;
            }
            try {
                const response = await fetch(`/api/movies/${id}/visibility`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                if (response.ok) {
                    try { sessionStorage.removeItem('moviesCache'); } catch (e) {}
                    loadMovies();
                } else {
                    const data = await response.json();
                    alert(data?.error || 'Failed to update visibility');
                }
            } catch (err) {
                alert('Error updating movie visibility');
            }
        }

        // Delete a movie
        async function deleteMovie(id) {
            if (!confirm('Are you sure you want to delete this movie?')) {
                return;
            }

            if (!adminToken) {
                alert('You must be logged in as admin to delete movies');
                hideAdminUI();
                return;
            }

            try {
                const response = await fetch(`/api/movies/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`,
                        'X-Admin-Token': adminToken,
                        'Content-Type': 'application/json'
                    }
                });
                
                let data;
                try {
                    data = await response.json();
                } catch (e) {
                }
                
                if (response.ok) {
                    try { sessionStorage.removeItem('moviesCache'); } catch (e) {}
                    loadMovies(); // Reload the list
                } else {
                    
                    if (response.status === 401) {
                        alert('Your admin session has expired. Please log in again.');
                        hideAdminUI();
                    } else {
                        alert(data?.error || 'Failed to delete movie');
                    }
                }
            } catch (err) {
                alert('Error deleting movie. Please check if you are still logged in.');
                checkAdminStatus();
            }
        }

        // Check admin status when page loads
        checkAdminStatus();
    </script>
</body>
</html>
