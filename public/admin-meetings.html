<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Manager - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Meeting Manager</h1>
            <div>
                <a href="/" class="btn btn-outline-secondary me-2">Home</a>
                <button onclick="logout()" class="btn btn-outline-danger">Logout</button>
            </div>
        </div>

        <div class="auth-section" id="loginSection">
            <h2>Admin Login Required</h2>
            <div class="input-group mb-3">
                <input type="password" id="passwordInput" class="form-control" placeholder="Enter admin password">
                <button onclick="login()" class="btn btn-primary">Login</button>
            </div>
        </div>

        <div id="mainContent" class="d-none">
            <!-- Create Meeting Form -->
            <div class="card mb-4">
                <div class="card-header">
                    <h3 class="card-title mb-0">Create New Meeting</h3>
                </div>
                <div class="card-body">
                    <form id="createMeetingForm" onsubmit="createMeeting(event)">
                        <div class="mb-3">
                            <label for="meetingName" class="form-label">Meeting Name</label>
                            <input type="text" class="form-control" id="meetingName" required>
                        </div>
                        <div class="mb-3">
                            <label for="meetingNotes" class="form-label">Meeting Notes</label>
                            <textarea class="form-control" id="meetingNotes" rows="3" 
                                      placeholder="Add any instructions, themes, or context for this meeting..."></textarea>
                            <div class="form-text">Optional notes that will be displayed to voters during the voting process.</div>
                        </div>
                        <!-- Meeting date removed: we require votes for candidate days instead -->
                        <div class="mb-3">
                            <label class="form-label">Candidate Days</label>
                            <div id="candidateDays" class="mb-2"></div>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="addCandidateDay()">
                                Add Day Option
                            </button>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Movie Selection</label>
                            
                            <!-- Genre-based selection controls -->
                            <div class="card mb-3">
                                <div class="card-header">
                                    <h6 class="mb-0">Select by Genre</h6>
                                </div>
                                <div class="card-body">
                                    <div class="row mb-2">
                                        <div class="col-md-6">
                                            <button type="button" class="btn btn-outline-success btn-sm me-2" onclick="selectAllMovies()">
                                                Select All Movies
                                            </button>
                                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="deselectAllMovies()">
                                                Deselect All
                                            </button>
                                        </div>
                                    </div>
                                    <div id="genreSelectors" class="row g-2">
                                        <!-- Genre buttons will be populated here -->
                                    </div>
                                </div>
                            </div>
                            
                            <!-- Individual movie selection -->
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0">Individual Movie Selection</h6>
                                </div>
                                <div class="card-body">
                                    <div class="row" id="movieOptions">
                                        <!-- Individual movie checkboxes will be populated here -->
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Create Meeting</button>
                    </form>
                </div>
            </div>

            <!-- Existing Meetings -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title mb-0">Existing Meetings</h3>
                </div>
                <div class="card-body">
                    <div id="meetingsList">
                        <!-- Meetings will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let adminToken = localStorage.getItem('adminToken');
        const loginSection = document.getElementById('loginSection');
        const mainContent = document.getElementById('mainContent');
        let movies = [];
        let meetings = [];

        // Check admin status
        async function checkAdminStatus() {
            try {
                const response = await fetch('https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/admin/me', {
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                const data = await response.json();
                if (data.admin) {
                    showMainContent();
                    loadData();
                } else {
                    hideMainContent();
                }
            } catch (err) {
                hideMainContent();
            }
        }

        // Set watched movie for a meeting (admin)
        async function setWatchedMovie(meetingId, meetingName) {
            // Create modal HTML for movie selection
            const movieOptions = movies.map(movie => 
                `<option value="${movie.id}">${movie.title}</option>`
            ).join('');
            
            const modalHTML = `
                <div class="modal fade" id="setWatchedMovieModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Set Watched Movie for: ${meetingName}</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <p class="text-muted">Select which movie was actually watched for this meeting:</p>
                                <div class="mb-3">
                                    <label for="watchedMovieSelect" class="form-label">Movie</label>
                                    <select class="form-select" id="watchedMovieSelect">
                                        <option value="">-- Clear watched movie --</option>
                                        ${movieOptions}
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                <button type="button" class="btn btn-primary" onclick="confirmSetWatchedMovie('${meetingId}')">
                                    Set Movie
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Remove existing modal if any
            const existingModal = document.getElementById('setWatchedMovieModal');
            if (existingModal) existingModal.remove();
            
            // Add modal to page and show it
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            const modal = new bootstrap.Modal(document.getElementById('setWatchedMovieModal'));
            modal.show();
        }

        // Confirm and execute setting watched movie
        async function confirmSetWatchedMovie(meetingId) {
            const selectElement = document.getElementById('watchedMovieSelect');
            const movieId = selectElement.value || null;
            
            try {
                const response = await fetch(`https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/meetings/${meetingId}/watched`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ movieId })
                });
                
                if (response.ok) {
                    // Close modal and refresh meetings
                    bootstrap.Modal.getInstance(document.getElementById('setWatchedMovieModal')).hide();
                    await loadMeetings();
                } else {
                    const data = await response.json().catch(() => ({}));
                    alert(data.error || 'Failed to set watched movie');
                }
            } catch (err) {
                alert('Error setting watched movie');
            }
        }

        // Toggle voting status for a meeting (admin)
        async function toggleVoting(id, currentState) {
            if (!confirm(`Are you sure you want to ${currentState ? 'finish' : 'open'} voting for this meeting?`)) return;
            try {
                const response = await fetch(`https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/meetings/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ voting_open: !currentState })
                });
                if (!response.ok) {
                    const data = await response.json().catch(()=>null);
                    alert(data && data.error ? data.error : 'Failed to update meeting');
                }
                await loadMeetings();
            } catch (err) {
                alert('Error updating meeting');
            }
        }

        // Login function
        async function login() {
            const password = document.getElementById('passwordInput').value;
            try {
                const response = await fetch('https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (data.token) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    showMainContent();
                    loadData();
                    document.getElementById('passwordInput').value = '';
                } else {
                    alert('Invalid password');
                }
            } catch (err) {
                alert('Login failed');
            }
        }

        // Logout function
        async function logout() {
            try {
                await fetch('https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/admin/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
            } catch (err) {
            }
            adminToken = null;
            localStorage.removeItem('adminToken');
            hideMainContent();
        }

        // UI helper functions
        function showMainContent() {
            loginSection.classList.add('d-none');
            mainContent.classList.remove('d-none');
        }

        function hideMainContent() {
            loginSection.classList.remove('d-none');
            mainContent.classList.add('d-none');
        }

        // Load movies and meetings
        async function loadData() {
            await Promise.all([
                loadMovies(),
                loadMeetings()
            ]);
        }

        async function loadMovies() {
            try {
                const response = await fetch('https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/movies');
                movies = await response.json();
                updateMovieOptions();
            } catch (err) {
                console.error('Error loading movies:', err);
            }
        }

        async function loadMeetings() {
            try {
                const response = await fetch('https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/meetings');
                const basicMeetings = await response.json();
                
                // Fetch detailed info for each meeting to get watched_movie data
                meetings = await Promise.all(
                    basicMeetings.map(async (meeting) => {
                        try {
                            const detailResponse = await fetch(`https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/meetings/${meeting.id}`);
                            return detailResponse.ok ? await detailResponse.json() : meeting;
                        } catch (err) {
                            return meeting; // fallback to basic info if detail fetch fails
                        }
                    })
                );
                
                updateMeetingsList();
            } catch (err) {
            }
        }

        function updateMovieOptions() {
            const container = document.getElementById('movieOptions');
            
            // Collect all unique genres
            const allGenres = new Set();
            movies.forEach(movie => {
                if (movie.genres) {
                    try {
                        const genres = typeof movie.genres === 'string' ? JSON.parse(movie.genres) : movie.genres;
                        if (Array.isArray(genres)) {
                            genres.forEach(genre => allGenres.add(genre));
                        }
                    } catch (e) {
                        console.warn(`Error parsing genres for movie ${movie.title}:`, e);
                    }
                }
            });
            
            // Update genre selectors
            updateGenreSelectors(Array.from(allGenres).sort());
            
            // Create individual movie checkboxes
            container.innerHTML = movies.map(movie => {
                
                // Get genres for this movie
                let movieGenres = [];
                try {
                    movieGenres = movie.genres ? (typeof movie.genres === 'string' ? JSON.parse(movie.genres) : movie.genres) : [];
                } catch (e) {}
                
                const genresText = movieGenres.length > 0 ? ` (${movieGenres.join(', ')})` : '';
                
                return `
                    <div class="col-md-6 mb-2">
                        <div class="form-check">
                            <input class="form-check-input movie-checkbox" type="checkbox" value="${movie.id}" id="movie${movie.id}" 
                                   data-genres="${movieGenres.join(',')}" checked>
                            <label class="form-check-label" for="movie${movie.id}">
                                <strong>${movie.title}</strong>${genresText}
                            </label>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateGenreSelectors(genres) {
            const container = document.getElementById('genreSelectors');
            
            // Count movies per genre
            const genreCounts = {};
            movies.forEach(movie => {
                if (movie.genres) {
                    try {
                        const movieGenres = typeof movie.genres === 'string' ? JSON.parse(movie.genres) : movie.genres;
                        if (Array.isArray(movieGenres)) {
                            movieGenres.forEach(genre => {
                                genreCounts[genre] = (genreCounts[genre] || 0) + 1;
                            });
                        }
                    } catch (e) {}
                }
            });
            
            container.innerHTML = genres.map(genre => {
                const count = genreCounts[genre] || 0;
                return `
                    <div class="col-auto mb-1">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-outline-primary btn-sm" onclick="selectByGenre('${genre}')" 
                                    title="Select all ${count} ${genre} movies">
                                ✓ ${genre} (${count})
                            </button>
                            <button type="button" class="btn btn-outline-secondary btn-sm" onclick="deselectByGenre('${genre}')"
                                    title="Deselect all ${genre} movies">
                                ✗
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Genre-based selection functions
        function selectAllMovies() {
            document.querySelectorAll('.movie-checkbox').forEach(checkbox => {
                checkbox.checked = true;
            });
        }
        
        function deselectAllMovies() {
            document.querySelectorAll('.movie-checkbox').forEach(checkbox => {
                checkbox.checked = false;
            });
        }
        
        function selectByGenre(genre) {
            document.querySelectorAll('.movie-checkbox').forEach(checkbox => {
                const movieGenres = checkbox.dataset.genres.split(',');
                if (movieGenres.includes(genre)) {
                    checkbox.checked = true;
                }
            });
        }
        
        function deselectByGenre(genre) {
            document.querySelectorAll('.movie-checkbox').forEach(checkbox => {
                const movieGenres = checkbox.dataset.genres.split(',');
                if (movieGenres.includes(genre)) {
                    checkbox.checked = false;
                }
            });
        }

        function updateMeetingsList() {
            const container = document.getElementById('meetingsList');
            if (meetings.length === 0) {
                container.innerHTML = '<p class="text-muted">No meetings yet</p>';
                return;
            }

            container.innerHTML = meetings.map(meeting => `
                <div class="card mb-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="card-title">${meeting.name || 'Unnamed Meeting'}</h5>
                                <p class="card-text">
                                    ${meeting.date ? `Date: ${meeting.date}<br>` : ''}
                                    Status: ${meeting.voting_open ? 'Voting Open' : 'Voting Closed'}<br>
                                    Watched Movie: ${meeting.watched_movie ? `<strong>${meeting.watched_movie.title}</strong>` : '<span class="text-muted">None selected</span>'}
                                </p>
                                ${meeting.notes ? `
                                    <p class="card-text">
                                        <strong>Notes:</strong> ${meeting.notes}
                                    </p>
                                ` : ''}
                                ${meeting.candidate_days && meeting.candidate_days.length > 0 ? `
                                    <p class="card-text">
                                        <small class="text-muted">
                                            Candidate Days: ${meeting.candidate_days.join(', ')}
                                        </small>
                                    </p>
                                ` : ''}
                            </div>
                                            <div class="btn-group" role="group">
                                                <a href="/admin-meeting-details.html?id=${meeting.id}" class="btn btn-info btn-sm">
                                                    View Details
                                                </a>
                                                <button onclick="setWatchedMovie('${meeting.id}', '${meeting.name || 'Unnamed Meeting'}')" class="btn btn-outline-primary btn-sm" title="Set which movie was watched">
                                                    Set Watched Movie
                                                </button>
                                                <button onclick="toggleVoting('${meeting.id}', ${meeting.voting_open})" class="btn btn-sm ${meeting.voting_open ? 'btn-warning' : 'btn-success'}">
                                                    ${meeting.voting_open ? 'Finish Voting' : 'Open Voting'}
                                                </button>
                                                <button onclick="deleteMeeting('${meeting.id}')" class="btn btn-danger btn-sm">
                                                    Delete
                                                </button>
                                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Add candidate day field
        function addCandidateDay() {
            const container = document.getElementById('candidateDays');
            const dayCount = container.children.length;
            const dayDiv = document.createElement('div');
            dayDiv.className = 'input-group mb-2';
            dayDiv.innerHTML = `
                <input type="date" class="form-control candidate-day" required>
                <button type="button" class="btn btn-outline-danger" onclick="this.parentElement.remove()">
                    Remove
                </button>
            `;
            container.appendChild(dayDiv);
        }

        // Create meeting
        async function createMeeting(event) {
            event.preventDefault();
            const name = document.getElementById('meetingName').value;
            const notes = document.getElementById('meetingNotes').value.trim();
            // date removed from form: meeting date is not collected here
            const date = null;
            const candidateDays = Array.from(document.getElementsByClassName('candidate-day'))
                .map(input => input.value)
                .filter(Boolean);
            const checkedBoxes = document.querySelectorAll('#movieOptions input:checked');
            const allowedMovieIds = Array.from(checkedBoxes)
                .map(checkbox => {
                    return checkbox.value;
                });


            try {
                const response = await fetch('https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/meetings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({
                        name,
                        notes: notes || null,
                        candidate_days: candidateDays,
                        allowed_movie_ids: allowedMovieIds,
                        voting_open: true
                    })
                });

                if (response.ok) {
                    const responseData = await response.json();
                    document.getElementById('createMeetingForm').reset();
                    document.getElementById('candidateDays').innerHTML = '';
                    loadMeetings();
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('Failed to create meeting:', response.status, errorData);
                    alert(`Failed to create meeting: ${errorData.error || response.statusText}`);
                }
            } catch (err) {
                alert('Error creating meeting');
            }
        }

        // Delete meeting
        async function deleteMeeting(id) {
            if (!confirm('Are you sure you want to delete this meeting?')) {
                return;
            }

            try {
                const response = await fetch(`https://us-central1-distributed-denial-of-screen.cloudfunctions.net/api/meetings/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${adminToken}`
                    }
                });
                
                if (response.ok) {
                    loadMeetings();
                } else {
                    const data = await response.json();
                    alert(data.error || 'Failed to delete meeting');
                }
            } catch (err) {
                alert('Error deleting meeting');
            }
        }

        // Add enter key support for login
        document.getElementById('passwordInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });

        // Initialize admin status check
        checkAdminStatus();
    </script>
</body>
</html>
