name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          ADMIN_PASSWORD_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Run Functions tests
        run: |
          cd functions
          npm test
        env:
          NODE_ENV: test

      - name: Generate test coverage
        run: npm run test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  deploy:
    name: Deploy to Firebase
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: |
          cd functions
          npm ci

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Firebase service account file
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > ./service-account.json

      - name: Set up environment variables
        run: |
          echo "GOOGLE_APPLICATION_CREDENTIALS=./service-account.json" >> $GITHUB_ENV
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Write functions/.env for deploy
        # Firebase Functions now reads runtime env from functions/.env. The old
        # `firebase functions:config:set` command is deprecated and fails on
        # current CLI versions.
        run: |
          cat > functions/.env <<EOF
          ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
          TMDB_API_KEY=${{ secrets.TMDB_API_KEY }}
          EOF

      - name: Deploy to Firebase
        # Auth via the service account JSON at GOOGLE_APPLICATION_CREDENTIALS.
        # The old --token flow (firebase login:ci) is deprecated.
        run: |
          firebase deploy --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive

      - name: Clean up functions/.env
        if: always()
        run: rm -f functions/.env

      - name: Clean up service account file
        if: always()
        run: rm -f ./service-account.json

      - name: Deployment notification
        if: success()
        run: echo "🚀 Successfully deployed to Firebase!"

      - name: Deployment failure notification
        if: failure()
        run: echo "❌ Firebase deployment failed!"
